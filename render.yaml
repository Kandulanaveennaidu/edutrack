# ──────────────────────────────────────────────────────────────
# Render.com Blueprint — Auto-deploy CampusIQ (EduTrack)
# Push this file to your repo, then on Render dashboard:
#   New → Blueprint → Connect repo → Done!
# ──────────────────────────────────────────────────────────────

services:
  - type: web
    name: campusiq
    runtime: node
    region: oregon # Free tier available in Oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: MONGODB_URI
        sync: false # You'll enter this manually in Render dashboard
      - key: NEXTAUTH_SECRET
        generateValue: true # Render auto-generates a random secret
      - key: NEXTAUTH_URL
        sync: false # Set to https://campusiq.onrender.com after deploy
      # ── Optional: Email (Gmail SMTP) ──
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
      # ── Optional: Cloudinary (File Uploads) ──
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # ── Optional: Twilio (SMS/WhatsApp) ──
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      # ── Optional: Gemini AI Chatbot ──
      - key: GEMINI_API_KEY
        sync: false
      # ── Optional: Payments ──
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
