# ─── CampusIQ Nginx Configuration ──────────────────────────────────
# Works with IP address directly. For domain + SSL, see comments below.
#
# After getting a domain, run:
#   sudo apt install certbot python3-certbot-nginx -y
#   sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN

# Main HTTP server (works with IP address)
server {
    listen 80;
    server_name 44.192.75.16 localhost _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Proxy to Node.js app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Socket.IO WebSocket support
    location /api/socketio {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Serve Next.js static assets DIRECTLY from disk (bypasses Node.js)
    location /_next/static/ {
        alias /home/ubuntu/campusiq/.next/static/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Serve public assets directly from disk
    location /public/ {
        alias /home/ubuntu/campusiq/public/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Serve manifest.json and sw.js from public/
    location = /manifest.json {
        alias /home/ubuntu/campusiq/public/manifest.json;
        add_header Content-Type "application/manifest+json";
    }

    location = /sw.js {
        alias /home/ubuntu/campusiq/public/sw.js;
        add_header Content-Type "application/javascript";
    }

    # Let Certbot handle ACME challenges (for future SSL setup)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Deny access to dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Max upload size (for file imports)
    client_max_body_size 10M;
}
